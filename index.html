<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1186c4" />
    <meta name="description" content="Reserve rooms at Briya Public Charter School locations — Fort Totten, Georgia, Ontario, Shepherd, and Georgia Annex." />
    <meta name="keywords" content="Briya, Briya Public Charter School, room reservation, book a room, DC charter school, Fort Totten, Georgia, Ontario, Shepherd" />
    <meta name="robots" content="index, follow" />
    <title>Briya Room Reservations</title>

    <!-- Open Graph — controls how the link looks when shared on Slack, Teams, iMessage, etc. -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Briya Room Reservations" />
    <meta property="og:description" content="Reserve rooms at Briya Public Charter School — Fort Totten, Georgia, Ontario, Shepherd, and Georgia Annex." />
    <meta property="og:image"       content="/briya_logo.png" />
    <meta property="og:url"         content="https://rooms.briya.org/" />
    <meta property="og:locale"      content="en_US" />

    <!-- GitHub Pages SPA: restore path after 404 redirect -->
    <script>
      ;(function () {
        var p = new URLSearchParams(window.location.search).get('p')
        if (p) window.history.replaceState(null, '', p)
      })()
    </script>

    <!-- Preconnect to Google Fonts CDN (font CSS + font files live on two origins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preconnect to the production API — replace with your Linode domain before deploying -->
    <link rel="preconnect" href="https://api.briya.org" />
    <link rel="dns-prefetch" href="https://api.briya.org" />

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/briya_logo.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
